<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooket Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #0f0; text-align: center; padding: 30px; margin: 0; }
    h1 { color: #00ff88; }
    input, button, select { padding: 15px; margin: 10px; font-size: 18px; border-radius: 8px; }
    button { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
    .status { font-size: 22px; margin: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Blooket Bot</h1>
  
  <p>Enter Code:</p>
  <input type="text" id="code" placeholder="7730978" style="width: 250px; text-align: center;">

  <br>
  <label>Bots: <input type="number" id="amount" value="15" min="1" max="200"></label><br><br>

  <button onclick="floodJoin()">🚀 Start Flood</button>
  <button onclick="stopAll()">⛔ Stop All</button>

  <div class="status" id="status">Status: Ready</div>

  <script>
    let connections = [];

    async function floodJoin() {
      const code = document.getElementById('code').value.trim();
      let amount = parseInt(document.getElementById('amount').value) || 10;

      if (!code) return alert("Enter a valid game code!");

      document.getElementById('status').innerHTML = `Joining ${amount} bots to game ${code}...`;

      for (let i = 0; i < amount; i++) {
        const botName = `Bot${1000 + i}`;
        
        // More realistic join attempt
        try {
          const ws = new WebSocket("wss://games.blooket.com/socket");
          
          ws.onopen = () => {
            ws.send(JSON.stringify({
              "action": "join",
              "gameId": code,
              "name": botName,
              "client": "web"
            }));
          };

          ws.onerror = () => console.log(`Bot ${i} error`);
          ws.onclose = () => console.log(`Bot ${i} closed`);

          connections.push(ws);
        } catch(e) {}

        await new Promise(r => setTimeout(r, 250)); // Small delay
      }

      document.getElementById('status').innerHTML = `✅ Sent ${amount} bots! Check the Blooket game.`;
    }

    function stopAll() {
      connections.forEach(ws => ws.close());
      connections = [];
      document.getElementById('status').innerHTML = "All bots stopped.";
    }
  </script>
</body>
</html>
