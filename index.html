<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooket Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #0f0; text-align: center; padding: 30px; margin: 0; }
    h1 { color: #00ff88; }
    input, button, select { padding: 12px; margin: 8px; font-size: 18px; border-radius: 8px; width: 280px; }
    button { background: #00ff88; color: black; font-weight: bold; cursor: pointer; }
    .status { font-size: 22px; margin: 20px; font-weight: bold; color: #0f0; }
  </style>
</head>
<body>
  <h1>Blooket Bot</h1>
  
  <p>Enter Game Code:</p>
  <input type="text" id="code" placeholder="7730978">

  <br>
  <label>Name: <input type="text" id="name" value="BotPlayer" style="width: 200px;"></label><br><br>

  <button onclick="joinGame()">Join Game</button>
  <button onclick="floodJoin()">Flood Bots</button>
  <button onclick="leaveGame()">Leave</button>

  <div class="status" id="status">Status: Ready</div>

  <script>
    // Paste key parts from the original script here (Firebase join logic)
    let botinfo = { connected: false };

    async function joinGame() {
      const code = document.getElementById('code').value.trim();
      const name = document.getElementById('name').value.trim() || "Bot" + Math.floor(Math.random()*9999);
      
      if (!code) return alert("Enter a game code!");

      document.getElementById('status').innerHTML = "Connecting...";

      // This is the core join logic from the original
      try {
        const response = await fetch('https://blooketbot.schoolcheats.net/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: code, name: name })
        });
        
        const data = await response.json();
        
        if (data.success) {
          botinfo.connected = true;
          document.getElementById('status').innerHTML = `✅ Connected as ${name}`;
        } else {
          document.getElementById('status').innerHTML = "Failed: " + (data.msg || "Unknown error");
        }
      } catch(e) {
        document.getElementById('status').innerHTML = "Connection error";
      }
    }

    async function floodJoin() {
      const code = document.getElementById('code').value.trim();
      if (!code) return alert("Enter code first!");

      for (let i = 0; i < 15; i++) {
        setTimeout(() => {
          const tempName = "FloodBot" + i;
          fetch('https://blooketbot.schoolcheats.net/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: code, name: tempName })
          });
        }, i * 400);
      }
      document.getElementById('status').innerHTML = "Flooding 15 bots...";
    }

    function leaveGame() {
      document.getElementById('status').innerHTML = "Disconnected";
      botinfo.connected = false;
    }
  </script>
</body>
</html>
