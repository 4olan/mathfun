<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooket Bot</title>
  <style>
    body {
      background-color: #111111;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      margin: 0;
    }
    h1 {
      color: #ffffff;
      margin-bottom: 30px;
    }
    input {
      background-color: #222222;
      color: white;
      border: 2px solid #444444;
      padding: 12px;
      font-size: 18px;
      width: 280px;
      margin: 10px;
      border-radius: 6px;
    }
    button {
      background-color: #ffffff;
      color: black;
      border: none;
      padding: 14px 32px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 6px;
      margin: 15px;
    }
    button:hover {
      background-color: #cccccc;
    }
    #status {
      font-size: 22px;
      margin-top: 30px;
      min-height: 30px;
    }
    .label {
      display: block;
      margin: 8px 0 4px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Blooket Bot</h1>
  
  <div class="label">Game Code</div>
  <input id="gcode" placeholder="Enter Game ID" />

  <div class="label">Bot Name</div>
  <input id="gname" placeholder="Bot Name" value="Bot" />

  <br>
  <label>
    <input type="checkbox" id="fpswitch" checked> First Place Switch (add spaces)
  </label>

  <br><br>
  <button onclick="join()">Add Bot</button>

  <div id="status">Status: Ready</div>

  <script src="script.js"></script>
</body>
</html>
