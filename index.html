<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blooket Bot</title>
  <link rel="icon" href="https://blooketbot.schoolcheats.net/bblogo.png" />
  <style>
    .mainBody {
  margin: 0;
  padding: 0;
  position: absolute;
  top: 0;
  left: 0;
  font-family: Nunito, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: #3a3a3a;
  width: 100%;
  min-height: 100vh;
}

.normtext {
  z-index: 1 !important;
  font-size: 40px;
  color: #fff;
  text-align: left;
  margin-left: 1px;
  font-family: Titan One, sans-serif;
  -webkit-user-select: none;
  -moz-user-select: none;
  user-select: none;
  text-decoration: none;
}

.joinButton {
  height: 60px;
  width: 200px;
  cursor: pointer;
  background-color: #fff;
  box-shadow: inset 0 -6px #0003, 0 0 4px #00000026;
  border-radius: 5px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  transition: 0.2s;
  font-size: 24px;
  font-weight: bold;
  margin: 15px;
}

.joinButton:hover {
  transform: scale(0.95);
}

#status {
  font-size: 28px;
  margin-top: 20px;
}

/* Add more styles from the original if you want it to look exactly the same */
    /* (I'll keep it short for now - you can copy the .mainBody, .normtext, etc. styles) */
    body { background: rgb(9, 148, 65); font-family: Nunito, sans-serif; text-align: center; color: white; }
    input, button { padding: 12px; margin: 8px; font-size: 18px; }
    .joinButton { background: white; color: black; padding: 15px 30px; font-size: 24px; cursor: pointer; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="mainBody">
    <h1 style="font-size: 48px;">Blooket Bot</h1>
    
    <div class="normtext">Enter code:</div>
    <input id="gcode" placeholder="Game ID" style="font-size: 28px; width: 200px; text-align: center;" />
    
    <div class="normtext">Nickname:</div>
    <input id="gname" placeholder="Bot Name" value="Bot" style="font-size: 28px; width: 300px; text-align: center;" />
    
    <div onclick="join()" class="joinButton">JOIN / FLOOD</div>
    
    <div id="status" class="normtext">Status: Ready</div>
    
    <p><a href="https://discord.gg/FcYy4uHUws" target="_blank">Join Discord</a></p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-database-compat.js"></script>

  <script src="script.js"></script>
</body>
</html>
